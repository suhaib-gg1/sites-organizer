<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <title>منظم ومستعرض المسلسلات المحلي - نسخة PWA</title>
    <style>
        :root {
            --bg-dark: #0b0b0d;
            --bg-sidebar: #13131a;
            --bg-card: #1c1c24;
            --primary: #8c52ff;
            --primary-hover: #703be3;
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --success: #00e676;
            --border: #292933;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            overflow-y: auto;
            height: 100%;
            position: relative;
        }

        .playlist-input-zone, .settings-zone {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .settings-zone {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .settings-zone h3 {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .playlist-input-zone input, .settings-zone input {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        .playlist-input-zone input:focus, .settings-zone input:focus {
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn:hover { background-color: var(--primary-hover); }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        .btn-secondary:hover { background-color: var(--border); }

        .playlists-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .playlist-item {
            padding: 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .playlist-item:hover, .playlist-item.active {
            border-color: var(--primary);
            background: rgba(140, 82, 255, 0.08);
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .delete-btn:hover { transform: scale(1.1); }

        .header-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .video-container {
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            aspect-ratio: 16/9;
            display: none;
            position: relative;
        }

        .video-container:fullscreen {
            max-width: 100vw;
            width: 100vw;
            height: 100vh;
            aspect-ratio: auto;
            border-radius: 0;
            margin-bottom: 0;
        }

        video { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }

        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .video-container.hide-ui {
            cursor: none;
        }
        .video-container.hide-ui .custom-controls {
            opacity: 0;
            pointer-events: none;
        }

        .timeline-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            position: relative;
        }
        .timeline-progress {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 3px;
        }

        .controls-buttons-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .controls-left-side, .controls-right-side {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .ctrl-icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .ctrl-icon-btn:hover { color: var(--primary); }
        .time-txt { font-size: 0.85rem; color: #cccccc; user-select: none; }

        .episodes-section { width: 100%; max-width: 900px; }

        .controls-row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .episodes-list { display: flex; flex-direction: column; gap: 10px; }

        .episode-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .episode-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }

        .ep-main-row {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .status-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #3e3e4a;
            flex-shrink: 0;
        }

        .status-badge.watched {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .ep-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ep-duration {
            color: var(--text-muted);
            font-size: 0.85rem;
            white-space: nowrap;
            margin-right: auto; 
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: #292933;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .order-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .order-btn {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .order-btn:hover { background: var(--border); }

        .custom-modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2147483647;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-card {
            background: var(--bg-card);
            border: 2px solid var(--primary);
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            animation: popupScale 0.3s ease-out;
        }

        @keyframes popupScale {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: white;
        }

        .modal-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .modal-btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .floating-next-btn {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 30px;
            z-index: 2147483646;
            background-color: var(--primary);
            box-shadow: 0 8px 24px rgba(140, 82, 255, 0.5);
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .floating-next-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        @keyframes bounceIn {
            from { transform: scale(0.3); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #folder-input { display: none; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-left: none; border-bottom: 1px solid var(--border); height: auto; padding: 15px; }
            .main-content { padding: 15px; overflow-y: visible; }
            .header-zone { flex-direction: column; align-items: flex-start; gap: 12px; }
            .header-zone .btn { width: 100%; }
            .episode-card { padding: 12px; flex-direction: column; align-items: flex-start; gap: 12px; }
            .order-actions { width: 100%; justify-content: flex-end; border-top: 1px solid var(--border); padding-top: 10px; }
            .floating-next-btn { bottom: 50px; left: 20px; padding: 10px 16px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📁 قوائم التشغيل</h2>
        <div class="playlist-input-zone">
            <input type="text" id="new-playlist-name" placeholder="اسم المسلسل (مثلاً: ماي هيرو)...">
            <button class="btn" onclick="createNewPlaylist()">➕ إنشاء قائمة</button>
        </div>
        <ul class="playlists-list" id="playlists-container"></ul>

        <div class="settings-zone" id="playlist-settings-zone" style="display: none;">
            <h3>⚙️ إعدادات القائمة الحالية</h3>
            <label style="font-size:0.8rem; color:var(--text-muted);" for="ending-duration">مدة شارة النهاية (بالثواني):</label>
            <input type="number" id="ending-duration" value="90" min="0" onchange="updatePlaylistEndingDuration(this.value)">
        </div>
    </div>

    <div class="main-content">
        <div class="header-zone">
            <h1 id="current-playlist-title">اختر أو أنشئ قائمة تشغيل للبدء</h1>
            <div id="playlist-actions" style="display: none;">
                <button class="btn" onclick="document.getElementById('folder-input').click()">📥 اختيار ألبوم / مجلد كامل</button>
                <input type="file" id="folder-input" webkitdirectory directory multiple onchange="handleFolderSelect(event)">
            </div>
        </div>

        <div class="video-container" id="video-player-container">
            <video id="main-video"></video>

            <div class="custom-controls" id="custom-controls-bar">
                <div class="timeline-container" id="video-timeline">
                    <div class="timeline-progress" id="video-progress"></div>
                </div>
                <div class="controls-buttons-row">
                    <div class="controls-left-side">
                        <button class="ctrl-icon-btn" id="play-pause-btn">▶</button>
                        <span class="time-txt" id="time-display">00:00 / 00:00</span>
                    </div>
                    <div class="controls-right-side">
                        <button class="ctrl-icon-btn" id="fullscreen-btn">⛶</button>
                    </div>
                </div>
            </div>

            <div class="custom-modal" id="next-ep-modal">
                <div class="modal-card">
                    <h3>🎬 شارة النهاية بدأت!</h3>
                    <p>هل تود تخطي أغنية النهاية والانتقال للحلقة التالية مباشرة؟</p>
                    <div class="modal-btn-row">
                        <button class="btn" onclick="triggerNextEpisode()">نعم، الحلقة التالية</button>
                        <button class="btn btn-secondary" onclick="closeNotificationModal()">إلغاء (إكمال المشاهدة)</button>
                    </div>
                </div>
            </div>

            <button class="floating-next-btn" id="floating-next-trigger" onclick="triggerNextEpisode()">
                ⏭️ الانتقال للحلقة التالية
            </button>
        </div>

        <div class="episodes-section" id="episodes-section" style="display: none;">
            <div class="controls-row">
                <h3>الحلقات</h3>
                <button class="btn btn-secondary" id="sort-toggle-btn" style="padding: 8px 12px;" onclick="toggleSortOrder()">🔃 عكس ترتيب الحلقات</button>
            </div>
            <div class="episodes-list" id="episodes-container"></div>
        </div>
    </div>

    <script>
        let store = JSON.parse(localStorage.getItem('anime_organizer_data')) || { playlists: {} };
        let activePlaylistId = null;
        let loadedFilesMap = {}; 
        let activeEpisodeId = null; 
        let isAscending = true; 
        let isModalTriggered = false; 

        function saveToLocalStorage() {
            localStorage.setItem('anime_organizer_data', JSON.stringify(store));
        }

        function updatePlaylistEndingDuration(val) {
            if (!activePlaylistId) return;
            store.playlists[activePlaylistId].endingDuration = parseInt(val, 10) || 0;
            saveToLocalStorage();
        }

        const videoPlayer = document.getElementById('main-video');
        const videoContainer = document.getElementById('video-player-container');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const videoTimeline = document.getElementById('video-timeline');
        const videoProgress = document.getElementById('video-progress');
        const timeDisplay = document.getElementById('time-display');
        const controlsBar = document.getElementById('custom-controls-bar');

        function togglePlay() {
            if (videoPlayer.paused) {
                videoPlayer.play();
                playPauseBtn.innerText = "⏸";
            } else {
                videoPlayer.pause();
                playPauseBtn.innerText = "▶";
            }
        }
        playPauseBtn.addEventListener('click', togglePlay);
        videoPlayer.addEventListener('click', togglePlay);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (videoContainer.requestFullscreen) {
                    videoContainer.requestFullscreen();
                } else if (videoContainer.webkitRequestFullscreen) {
                    videoContainer.webkitRequestFullscreen();
                }
                fullscreenBtn.innerText = "内";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
                fullscreenBtn.innerText = "⛶";
            }
        }
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) fullscreenBtn.innerText = "⛶";
        });

        videoTimeline.addEventListener('click', (e) => {
            const rect = videoTimeline.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            videoPlayer.currentTime = pos * videoPlayer.duration;
        });

        let mouseTimeout;
        function resetControlsTimer() {
            videoContainer.classList.remove('hide-ui');
            clearTimeout(mouseTimeout);
            if (!videoPlayer.paused) {
                mouseTimeout = setTimeout(() => {
                    videoContainer.classList.add('hide-ui');
                }, 3000);
            }
        }
        videoContainer.addEventListener('mousemove', resetControlsTimer);
        videoPlayer.addEventListener('play', resetControlsTimer);
        videoPlayer.addEventListener('pause', () => {
            videoContainer.classList.remove('hide-ui');
            clearTimeout(mouseTimeout);
        });

        videoPlayer.ontimeupdate = function() {
            if (!activePlaylistId || !activeEpisodeId) return;
            
            const currentPlaylist = store.playlists[activePlaylistId];
            const episodes = currentPlaylist.episodes;
            const currentIndex = episodes.findIndex(e => e.id === activeEpisodeId);
            const ep = episodes[currentIndex];
            
            if (videoPlayer.duration) {
                const pct = (videoPlayer.currentTime / videoPlayer.duration) * 100;
                videoProgress.style.width = `${pct}%`;
                timeDisplay.innerText = `${formatDuration(videoPlayer.currentTime)} / ${formatDuration(videoPlayer.duration)}`;
            }

            if (ep) {
                ep.currentTime = videoPlayer.currentTime;
                ep.durationSec = videoPlayer.duration || ep.durationSec || 0;
                ep.watchedProgressText = formatDuration(videoPlayer.currentTime);
                
                const progressBar = document.getElementById(`bar-${activeEpisodeId}`);
                const progressText = document.getElementById(`text-${activeEpisodeId}`);
                if (progressBar && ep.durationSec > 0) {
                    const pct = (ep.currentTime / ep.durationSec) * 100;
                    progressBar.style.width = `${pct}%`;
                    if(progressText) {
                        progressText.innerText = `⏱️ ${ep.watchedProgressText} / ${ep.duration}`;
                    }
                }

                const playlistEndingDuration = currentPlaylist.endingDuration !== undefined ? currentPlaylist.endingDuration : 90;
                const skipThreshold = ep.durationSec - playlistEndingDuration;

                if (ep.durationSec > 30 && videoPlayer.currentTime >= skipThreshold && !isModalTriggered) {
                    isModalTriggered = true;
                    videoPlayer.pause(); 
                    playPauseBtn.innerText = "▶";
                    document.getElementById('next-ep-modal').style.display = 'flex';
                }
                
                if (Math.floor(videoPlayer.currentTime) % 4 === 0) {
                    saveToLocalStorage();
                }
            }
        };

        function triggerNextEpisode() {
            document.getElementById('next-ep-modal').style.display = 'none';
            document.getElementById('floating-next-trigger').style.display = 'none';

            if (!activePlaylistId || !activeEpisodeId) return;

            const episodes = store.playlists[activePlaylistId].episodes;
            const currentIndex = episodes.findIndex(e => e.id === activeEpisodeId);
            
            if (currentIndex !== -1) {
                episodes[currentIndex].watched = true;
                saveToLocalStorage();
                renderEpisodes();
            }

            const nextIndex = currentIndex + 1;
            if (nextIndex < episodes.length) {
                const nextEp = episodes[nextIndex];
                playEpisode(nextEp.id, nextEp.fileDataName);
            } else {
                alert("لقد أكملت مشاهدة جميع الحلقات المتوفرة في هذه القائمة!");
                if(document.fullscreenElement) document.exitFullscreen();
            }
        }

        function closeNotificationModal() {
            document.getElementById('next-ep-modal').style.display = 'none';
            document.getElementById('floating-next-trigger').style.display = 'block';
            videoPlayer.play(); 
            playPauseBtn.innerText = "⏸";
        }

        videoPlayer.onended = function() {
            document.getElementById('floating-next-trigger').style.display = 'none';
            
            if (!activePlaylistId || !activeEpisodeId) return;
            const episodes = store.playlists[activePlaylistId].episodes;
            const currentIndex = episodes.findIndex(e => e.id === activeEpisodeId);
            const nextIndex = currentIndex + 1;
            if (nextIndex < episodes.length) {
                const nextEp = episodes[nextIndex];
                playEpisode(nextEp.id, nextEp.fileDataName);
            }
        };

        videoPlayer.onpause = saveToLocalStorage;

        function createNewPlaylist() {
            const input = document.getElementById('new-playlist-name');
            const name = input.value.trim();
            if (!name) return;

            const id = 'pl_' + Date.now();
            store.playlists[id] = { id: id, name: name, episodes: [], endingDuration: 90 };
            saveToLocalStorage();
            input.value = '';
            renderPlaylists();
            selectPlaylist(id);
        }

        function deletePlaylist(id, e) {
            e.stopPropagation();
            if(confirm("هل أنت متأكد من حذف هذه القائمة؟")) {
                delete store.playlists[id];
                saveToLocalStorage();
                renderPlaylists();
                if(activePlaylistId === id) {
                    activePlaylistId = null;
                    activeEpisodeId = null;
                    document.getElementById('current-playlist-title').innerText = "اختر أو أنشئ قائمة تشغيل للبدء";
                    document.getElementById('playlist-actions').style.display = 'none';
                    document.getElementById('episodes-section').style.display = 'none';
                    videoContainer.style.display = 'none';
                    document.getElementById('playlist-settings-zone').style.display = 'none';
                    document.getElementById('floating-next-trigger').style.display = 'none';
                }
            }
        }

        function renderPlaylists() {
            const container = document.getElementById('playlists-container');
            container.innerHTML = '';
            for (const id in store.playlists) {
                const pl = store.playlists[id];
                const li = document.createElement('li');
                li.className = `playlist-item ${id === activePlaylistId ? 'active' : ''}`;
                li.onclick = () => selectPlaylist(id);
                li.innerHTML = `
                    <span>🎬 ${pl.name}</span>
                    <button class="delete-btn" onclick="deletePlaylist('${id}', event)">🗑️</button>
                `;
                container.appendChild(li);
            }
        }

        function selectPlaylist(id) {
            activePlaylistId = id;
            renderPlaylists();
            const pl = store.playlists[id];
            document.getElementById('current-playlist-title').innerText = pl.name;
            document.getElementById('playlist-actions').style.display = 'block';
            document.getElementById('episodes-section').style.display = 'block';
            
            const settingsInput = document.getElementById('ending-duration');
            settingsInput.value = pl.endingDuration !== undefined ? pl.endingDuration : 90;
            document.getElementById('playlist-settings-zone').style.display = 'flex';

            isAscending = true; 
            renderEpisodes();
            
            if(window.innerWidth <= 768) {
                document.getElementById('current-playlist-title').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function handleFolderSelect(event) {
            const files = Array.from(event.target.files).filter(file => file.type.startsWith('video/') || file.name.match(/\.(mp4|mkv|webm|avi)$/i));
            if (!files.length || !activePlaylistId) return;

            files.forEach(file => {
                loadedFilesMap[file.name] = file;

                const videoUrl = URL.createObjectURL(file);
                const tempVideo = document.createElement('video');
                tempVideo.src = videoUrl;
                
                tempVideo.onloadedmetadata = function() {
                    const durationStr = formatDuration(tempVideo.duration);
                    
                    const exists = store.playlists[activePlaylistId].episodes.some(e => e.fileDataName === file.name);
                    if (!exists) {
                        const newEpisode = {
                            id: 'ep_' + Date.now() + Math.random().toString(36).substr(2, 5),
                            name: file.name.replace(/\.[^/.]+$/, ""),
                            duration: durationStr,
                            durationSec: tempVideo.duration,
                            currentTime: 0,
                            watchedProgressText: "0:00",
                            watched: false,
                            fileDataName: file.name
                        };
                        store.playlists[activePlaylistId].episodes.push(newEpisode);
                        saveToLocalStorage();
                        renderEpisodes();
                    }
                    URL.revokeObjectURL(videoUrl);
                };
            });
            event.target.value = '';
        }

        function formatDuration(secs) {
            const minutes = Math.floor(secs / 60);
            const seconds = Math.floor(secs % 60);
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function renderEpisodes() {
            const container = document.getElementById('episodes-container');
            container.innerHTML = '';
            
            if (!activePlaylistId) return;
            const episodes = store.playlists[activePlaylistId].episodes;

            if(episodes.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">لا توجد حلقات هنا. اضغط بالأعلى واختر ألبوم المسلسل بالكامل!</p>';
                return;
            }

            episodes.forEach((ep, index) => {
                const card = document.createElement('div');
                card.className = 'episode-card';
                
                const currentProgress = ep.currentTime || 0;
                const totalDuration = ep.durationSec || 1;
                const progressPercentage = (currentProgress / totalDuration) * 100;
                const progressTextStr = ep.currentTime ? `${ep.watchedProgressText} / ${ep.duration}` : ep.duration;

                card.innerHTML = `
                    <div class="episode-info" onclick="playEpisode('${ep.id}', '${ep.fileDataName}')">
                        <div class="ep-main-row">
                            <div class="status-badge ${ep.watched ? 'watched' : ''}"></div>
                            <span class="ep-title">${ep.name}</span>
                            <span class="ep-duration" id="text-${ep.id}">⏱️ ${progressTextStr}</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" id="bar-${ep.id}" style="width: ${progressPercentage}%"></div>
                        </div>
                    </div>
                    <div class="order-actions">
                        <button class="order-btn" onclick="moveEpisode(${index}, -1)">🔼</button>
                        <button class="order-btn" onclick="moveEpisode(${index}, 1)">🔽</button>
                        <button class="delete-btn" style="margin-right:10px;" onclick="deleteEpisode('${ep.id}')">🗑️</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function playEpisode(epId, fileName) {
            const file = loadedFilesMap[fileName];
            
            if(file) {
                activeEpisodeId = epId;
                isModalTriggered = false; 
                document.getElementById('floating-next-trigger').style.display = 'none'; 
                
                videoPlayer.src = URL.createObjectURL(file);
                videoContainer.style.display = 'block';
                videoContainer.scrollIntoView({ behavior: 'smooth' });

                const ep = store.playlists[activePlaylistId].episodes.find(e => e.id === epId);
                
                videoPlayer.onloadedmetadata = function() {
                    if (ep && ep.currentTime) {
                        videoPlayer.currentTime = ep.currentTime;
                    }
                    videoPlayer.play();
                    playPauseBtn.innerText = "⏸";
                };

                if(ep && !ep.watched) {
                    ep.watched = true;
                    saveToLocalStorage();
                    renderEpisodes();
                }
            } else {
                alert("يرجى اختيار ألبوم/مجلد هذا المسلسل مجدداً لتفعيل ميزة التشغيل وحفظ السجلات.");
                document.getElementById('folder-input').click();
            }
        }

        function deleteEpisode(epId) {
            if(activeEpisodeId === epId) {
                activeEpisodeId = null;
                document.getElementById('floating-next-trigger').style.display = 'none';
            }
            store.playlists[activePlaylistId].episodes = store.playlists[activePlaylistId].episodes.filter(e => e.id !== epId);
            saveToLocalStorage();
            renderEpisodes();
        }

        function toggleSortOrder() {
            if (!activePlaylistId) return;

            const extractNumber = (text) => {
                const matches = text.match(/\d+/);
                return matches ? parseInt(matches[0], 10) : 0;
            };

            isAscending = !isAscending;

            store.playlists[activePlaylistId].episodes.sort((a, b) => {
                const numA = extractNumber(a.name);
                const numB = extractNumber(b.name);
                
                if (numA !== numB) {
                    return isAscending ? (numA - numB) : (numB - numA);
                }
                return isAscending ? a.name.localeCompare(b.name, 'ar', {numeric: true}) : b.name.localeCompare(a.name, 'ar', {numeric: true});
            });

            const btn = document.getElementById('sort-toggle-btn');
            btn.innerText = isAscending ? "🔢 ترتيب: من الأولى للأخيرة" : "🔢 ترتيب: من الأخيرة للأولى";

            saveToLocalStorage();
            renderEpisodes();
        }

        function moveEpisode(index, direction) {
            const episodes = store.playlists[activePlaylistId].episodes;
            const targetIndex = index + direction;
            
            if (targetIndex < 0 || targetIndex >= episodes.length) return;
            
            const temp = episodes[index];
            episodes[index] = episodes[targetIndex];
            episodes[targetIndex] = temp;
            
            saveToLocalStorage();
            renderEpisodes();
        }

        renderPlaylists();

        // تفعيل تسجيل الـ Service Worker ليعمل الموقع بدون إنترنت كـ PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker تم تسجيله بنجاح!', reg))
                    .catch(err => console.log('فشل تسجيل الـ Service Worker:', err));
            });
        }
    </script>
</body>
</html>
